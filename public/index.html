<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My API</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            }

            body {
                background: #0f172a;
                color: #e2e8f0;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }

            .container {
                text-align: center;
                padding: 40px;
                border-radius: 16px;
                background: #1e293b;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
                max-width: 500px;
                width: 90%;
            }

            h1 {
                font-size: 2.5rem;
                margin-bottom: 10px;
                color: #38bdf8;
            }

            p {
                color: #94a3b8;
                margin-bottom: 30px;
            }

            .endpoint {
                background: #0f172a;
                padding: 12px 16px;
                border-radius: 10px;
                margin: 8px 0;
                font-size: 0.9rem;
                border: 1px solid #334155;
                transition: 0.2s;
            }

            .endpoint:hover {
                background: #1e293b;
                border-color: #38bdf8;
            }

            .badge {
                display: inline-block;
                background: #22c55e;
                color: black;
                padding: 4px 10px;
                border-radius: 999px;
                font-size: 0.7rem;
                margin-bottom: 15px;
                font-weight: 600;
            }

            footer {
                margin-top: 25px;
                font-size: 0.8rem;
                color: #64748b;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="badge">API LIVE</div>

            <h1>🚀 My Backend API</h1>
            <p>Everything is up and running smoothly.</p>

            <div class="endpoint">GET /api/v1/healthcheck</div>
            <div class="endpoint">POST /api/v1/users/register</div>
            <div class="endpoint">POST /api/v1/users/login</div>
            <div class="endpoint">GET /api/v1/users/logout</div>

            <footer>Built with Node.js + Express</footer>
        </div>
    </body>
</html>
